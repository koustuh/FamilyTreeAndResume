<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Dog Image</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #f0f8ff;
    }
    img {
      max-width: 80%;
      height: auto;
      border: 10px solid #ccc;
      border-radius: 10px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0077cc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <h1>🐕 Random Dog Image</h1>
  <button onclick="getDogImage()">Get New Dog</button>
  <div>
    <img id="dogImage" src="" alt="Random Dog will appear here!">
  </div>

  <script>
    async function getDogImage() {
      try {
        const response = await fetch('https://dog.ceo/api/breeds/image/random');
        const data = await response.json();
        document.getElementById('dogImage').src = data.message;
      } catch (error) {
        console.error('Error fetching dog image:', error);
        alert("Couldn't fetch dog image. Try again!");
      }
    }

    // Load one image on page load
    window.onload = getDogImage;
  </script>
</body>
</html>
