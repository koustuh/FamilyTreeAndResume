<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NASA API Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #0b3d91;
      color: white;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    section {
      background: #1c4f9c;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 30px;
    }
    img {
      max-width: 100%;
      border-radius: 8px;
    }
    button {
      background: #f9a825;
      border: none;
      color: black;
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }
    pre {
      background: #022f66;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>NASA Free API Demo</h1>

  <!-- APOD: Astronomy Picture of the Day -->
  <section>
    <h2>Astronomy Picture of the Day (APOD)</h2>
    <button id="btn-apod">Get Today's Picture</button>
    <div id="apod-result"></div>
  </section>

  <!-- Mars Rover Photos -->
  <section>
    <h2>Mars Rover Photos</h2>
    <button id="btn-mars">Get Latest Mars Rover Photos</button>
    <div id="mars-result"></div>
  </section>

  <!-- NeoWs: Near Earth Objects -->
  <section>
    <h2>Near Earth Objects (NeoWs)</h2>
    <button id="btn-neows">Get Today’s NEO Data</button>
    <div id="neows-result"></div>
  </section>

  <!-- DONKI: Space Weather -->
  <section>
    <h2>Space Weather (DONKI)</h2>
    <button id="btn-donki">Get Latest Solar Flare Data</button>
    <div id="donki-result"></div>
  </section>

  <!-- EPIC: Earth Polychromatic Imaging Camera -->
  <section>
    <h2>EPIC Earth Images</h2>
    <button id="btn-epic">Get Latest Earth Image</button>
    <div id="epic-result"></div>
  </section>

  <script>
    const API_KEY = 'DEMO_KEY'; // You can get your own key at https://api.nasa.gov

    // APOD API
    document.getElementById('btn-apod').addEventListener('click', () => {
      fetch(`https://api.nasa.gov/planetary/apod?api_key=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('apod-result');
          if(data.media_type === 'image') {
            container.innerHTML = `
              <h3>${data.title}</h3>
              <img src="${data.url}" alt="${data.title}" />
              <p>${data.explanation}</p>
              <small>Date: ${data.date}</small>
            `;
          } else {
            container.innerHTML = `<p>Media type is not image. Try another day.</p>`;
          }
        })
        .catch(() => {
          alert('Error fetching APOD data');
        });
    });

    // Mars Rover Photos API
    document.getElementById('btn-mars').addEventListener('click', () => {
      // Get latest photos from Curiosity rover's latest sol
      fetch(`https://api.nasa.gov/mars-photos/api/v1/rovers/curiosity/latest_photos?api_key=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('mars-result');
          if(data.latest_photos && data.latest_photos.length > 0) {
            container.innerHTML = '<h3>Latest Curiosity Rover Photos</h3>' + 
              data.latest_photos.slice(0, 5).map(photo => `
                <img src="${photo.img_src}" alt="Mars Rover Photo" style="max-width:200px; margin: 5px; border-radius: 6px;" />
              `).join('');
          } else {
            container.innerHTML = '<p>No photos found.</p>';
          }
        })
        .catch(() => {
          alert('Error fetching Mars Rover photos');
        });
    });

    // NeoWs API
    document.getElementById('btn-neows').addEventListener('click', () => {
      const today = new Date().toISOString().split('T')[0];
      fetch(`https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&end_date=${today}&api_key=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('neows-result');
          if(data.near_earth_objects && data.near_earth_objects[today]) {
            const neos = data.near_earth_objects[today];
            container.innerHTML = `<h3>Near Earth Objects for ${today}</h3><ul>` + 
              neos.map(neo => `<li>${neo.name} - Diameter: ${neo.estimated_diameter.meters.estimated_diameter_min.toFixed(1)}m to ${neo.estimated_diameter.meters.estimated_diameter_max.toFixed(1)}m</li>`).join('') + '</ul>';
          } else {
            container.innerHTML = '<p>No NEO data for today.</p>';
          }
        })
        .catch(() => {
          alert('Error fetching NEO data');
        });
    });

    // DONKI API - Solar Flare
    document.getElementById('btn-donki').addEventListener('click', () => {
      fetch(`https://api.nasa.gov/DONKI/FLR?startDate=2025-01-01&endDate=2025-12-31&api_key=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('donki-result');
          if(data.length > 0) {
            const latest = data[data.length - 1];
            container.innerHTML = `
              <h3>Latest Solar Flare</h3>
              <p>Class Type: ${latest.classType}</p>
              <p>Begin Time: ${latest.beginTime}</p>
              <p>Peak Time: ${latest.peakTime}</p>
              <p>End Time: ${latest.endTime}</p>
            `;
          } else {
            container.innerHTML = '<p>No recent solar flare data.</p>';
          }
        })
        .catch(() => {
          alert('Error fetching DONKI data');
        });
    });

    // EPIC API - Earth images
    document.getElementById('btn-epic').addEventListener('click', () => {
      fetch(`https://api.nasa.gov/EPIC/api/natural/images?api_key=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('epic-result');
          if(data.length > 0) {
            const latest = data[0];
            const date = new Date(latest.date);
            const year = date.getUTCFullYear();
            const month = String(date.getUTCMonth() + 1).padStart(2, '0');
            const day = String(date.getUTCDate()).padStart(2, '0');
            const imageUrl = `https://api.nasa.gov/EPIC/archive/natural/${year}/${month}/${day}/png/${latest.image}.png?api_key=${API_KEY}`;
            container.innerHTML = `
              <h3>EPIC Image taken on ${latest.date}</h3>
              <img src="${imageUrl}" alt="EPIC Earth Image" />
              <p>Caption: ${latest.caption}</p>
            `;
          } else {
            container.innerHTML = '<p>No EPIC images found.</p>';
          }
        })
        .catch(() => {
          alert('Error fetching EPIC data');
        });
    });
  </script>
</body>
</html>
