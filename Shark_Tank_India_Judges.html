        body {
            font-family: Arial, sans-serif;

            margin: 0;
            padding: 20px;
        }
        /* Container for the judges section */
        .judges-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        /* Header styling */
        h1 {
            color: #333;
        }
        /* Individual judge section styling */
        .judge {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        /* Judge name styling */
        .judge h2 {
            margin: 0;
            color: #007bff;
        }
        /* Judge bio styling */
        .judge p {
            color: #555;
        }
    </style>
</head>
