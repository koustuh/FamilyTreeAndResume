<!DOCTYPE html>
<html>
<head>
    <title>Store Entry Form</title>
</head>
<body>
    <h2>Store and Employee Data Entry</h2>
    <form id="storeForm">
        <label>Store ID:</label><br>
        <input type="number" id="store_id" required><br><br>

        <label>Store Goal Amount (Manager):</label><br>
        <input type="number" id="store_goal_amount_manager" required><br><br>

        <label>Manager Goal:</label><br>
        <input type="number" id="manager_goal" required><br><br>

        <h3>Employees</h3>
        <div id="employeesContainer">
            <!-- Employee inputs go here -->
        </div>
        <button type="button" onclick="addEmployee()">+ Add Employee</button><br><br>

        <button type="submit">Submit</button>
    </form>

    <script>
        let employeeCount = 0;

        function addEmployee() {
            employeeCount++;
            const container = document.getElementById("employeesContainer");

            const html = `
                <div class="employee">
                    <label>Employee ID:</label>
                    <input type="number" name="empid${employeeCount}" required>
                    <label>Name:</label>
                    <input type="text" name="empname${employeeCount}" required>
                    <label>Goal:</label>
                    <input type="number" name="empgoal${employeeCount}" required>
                    <br><br>
                </div>
            `;
            container.insertAdjacentHTML("beforeend", html);
        }

        document.getElementById("storeForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const store_id = parseInt(document.getElementById("store_id").value);
            const store_goal_amount_manager = parseInt(document.getElementById("store_goal_amount_manager").value);
            const manager_goal = parseInt(document.getElementById("manager_goal").value);

            const employeeDivs = document.querySelectorAll(".employee");
            const employees = [];

            employeeDivs.forEach(div => {
                const inputs = div.querySelectorAll("input");
                employees.push({
                    empid: parseInt(inputs[0].value),
                    empname: inputs[1].value,
                    empgoal: parseInt(inputs[2].value)
                });
            });

            const payload = {
                store_id,
                store_goal_amount_manager,
                manager_goal,
                employees
            };

            try {
                const response = await fetch('https://localhost:5001/api/store', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Data submitted successfully.");
                    location.reload();
                } else {
                    alert("Error submitting data.");
                }
            } catch (error) {
                console.error(error);
                alert("Request failed.");
            }
        });
    </script>
</body>
</html>
