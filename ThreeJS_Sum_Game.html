<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Sum Game</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    #info { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 24px; }
  </style>
</head>
<body>
  <div id="info">Target: 10 | Score: 0</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,5);
    scene.add(light);

    // Target and score
    let target = 10;
    let score = 0;
    const infoEl = document.getElementById('info');
    let selectedCubes = [];

    // Create number cubes
    const cubes = [];
    const numbers = [2, 3, 4, 5, 6, 7, 8];
    const geometry = new THREE.BoxGeometry(1,1,1);

    numbers.forEach((num, index) => {
      const material = new THREE.MeshStandardMaterial({color: 0x00ff00});
      const cube = new THREE.Mesh(geometry, material);
      cube.position.set(index - 3, 0, 0);
      cube.userData = { number: num };
      scene.add(cube);
      cubes.push(cube);

      // Add number as text using simple canvas texture
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.font = 'bold 64px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(num, 64, 64);
      const texture = new THREE.CanvasTexture(canvas);
      cube.material.map = texture;
      cube.material.needsUpdate = true;
    });

    // Raycaster for clicks
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseClick(event){
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(cubes);
      if(intersects.length > 0){
        const cube = intersects[0].object;
        selectedCubes.push(cube);
        cube.material.color.set(0xff0000);

        if(selectedCubes.length === 2){
          const sum = selectedCubes[0].userData.number + selectedCubes[1].userData.number;
          if(sum === target){
            score++;
            infoEl.textContent = `Target: ${target} | Score: ${score} ✅ Correct!`;
            selectedCubes.forEach(c=>c.material.color.set(0x00ff00));
          } else {
            infoEl.textContent = `Target: ${target} | Score: ${score} ❌ Wrong!`;
            selectedCubes.forEach(c=>c.material.color.set(0x00ff00));
          }
          selectedCubes = [];
        }
      }
    }

    window.addEventListener('click', onMouseClick);

    // Animate
    function animate(){
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize
    window.addEventListener('resize', ()=>{
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
