<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
        form { background: #fff; padding: 20px; border-radius: 5px; max-width: 500px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { padding: 10px 20px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Post a Job</h1>
    <form id="jobForm">
        <input type="text" id="title" placeholder="Job Title" required>
        <input type="text" id="company" placeholder="Company Name" required>
        <input type="text" id="location" placeholder="Location" required>
        <textarea id="description" placeholder="Job Description" rows="5" required></textarea>
        <input type="url" id="applyLink" placeholder="Apply Link" required>
        <button type="submit">Post Job</button>
    </form>
    <p id="message"></p>

    <script>
        const form = document.getElementById('jobForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const jobData = {
                title: document.getElementById('title').value,
                company: document.getElementById('company').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value,
                apply_link: document.getElementById('applyLink').value
            };

            try {
                const response = await fetch('https://your-api-endpoint.com/jobs', { // replace with actual API URL
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_API_KEY' // if API requires auth
                    },
                    body: JSON.stringify(jobData)
                });

                if (response.ok) {
                    message.textContent = 'Job posted successfully!';
                    message.className = 'success';
                    form.reset();
                } else {
                    const error = await response.json();
                    message.textContent = 'Error: ' + (error.message || 'Failed to post job.');
                    message.className = 'error';
                }
            } catch (err) {
                message.textContent = 'Error: ' + err.message;
                message.className = 'error';
            }
        });
    </script>
</body>
</html>
