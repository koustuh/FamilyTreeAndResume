<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Document Q&A</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.7.107/build/pdf.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 100px; }
#answer { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h2>AI Document Q&A</h2>

<input type="file" id="files" multiple><br><br>
<button onclick="processFiles()">Upload & Process</button>

<h3>Ask a Question:</h3>
<input type="text" id="question" placeholder="Type your question here">
<button onclick="askQuestion()">Ask</button>

<div id="answer"></div>

<script>
let allText = '';

async function processFiles() {
    allText = '';
    const files = document.getElementById('files').files;
    for (const file of files) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'txt') {
            allText += await file.text() + '\n';
        } else if (ext === 'pdf') {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                allText += textContent.items.map(item => item.str).join(' ') + '\n';
            }
        } else {
            alert('Unsupported file type: ' + file.name);
        }
    }
    alert('Files processed successfully.');
}

async function askQuestion() {
    const question = document.getElementById('question').value;
    if (!question) return;

    const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer YOUR_OPENAI_API_KEY'
        },
        body: JSON.stringify({
            model: 'gpt-4',
            messages: [
                { role: 'system', content: 'You are a helpful AI assistant.' },
                { role: 'user', content: `Document content:\n${allText}\n\nQuestion: ${question}` }
            ]
        })
    });
    const data = await response.json();
    document.getElementById('answer').innerText = data.choices[0].message.content;
}
</script>

</body>
</html>
